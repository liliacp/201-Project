<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Pop Game 🎈</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }

    .game-container {
      background: rgba(0, 0, 0, 0.25);
      padding: 20px 30px 30px;
      border-radius: 16px;
      text-align: center;
      width: 320px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #gameArea {
      position: relative;
      width: 100%;
      height: 300px;
      background: #e0f7ff;
      border-radius: 12px;
      overflow: hidden;
      cursor: crosshair;
    }

    .bubble {
      position: absolute;
      width: 50px;
      height: 50px;
      background: radial-gradient(circle at 30% 30%, #fff, #ff6ec7);
      border-radius: 50%;
      cursor: pointer;
      animation: floatUp 4s linear forwards;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 1;
      }
      to {
        transform: translateY(-350px);
        opacity: 0.5;
      }
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ff6ec7;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #ff4bb8;
    }

    .game-over {
      margin-top: 10px;
      font-size: 1.1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>🎈 Bubble Pop 🎈</h1>
    <a href="index.html">Home</a> | 
    <a href="fromScratch.html">Things I Love</a>
    <div class="stats">
      <div>Score: <span id="score">0</span></div>
      <div>Time: <span id="time">30</span>s</div>
    </div>
    <div id="gameArea"></div>
    <button id="startBtn">Start Game</button>
    <div class="game-over" id="gameOver"></div>
  </div>

  <script>
    const gameArea = document.getElementById("gameArea");
    const scoreEl = document.getElementById("score");
    const timeEl = document.getElementById("time");
    const startBtn = document.getElementById("startBtn");
    const gameOverEl = document.getElementById("gameOver");

    let score = 0;
    let timeLeft = 30;
    let gameInterval;
    let bubbleInterval;

    function createBubble() {
      const bubble = document.createElement("div");
      bubble.classList.add("bubble");

      const size = Math.random() * 30 + 30;
      bubble.style.width = size + "px";
      bubble.style.height = size + "px";

      bubble.style.left = Math.random() * (gameArea.clientWidth - size) + "px";
      bubble.style.bottom = "-60px";

      bubble.addEventListener("click", () => {
        score++;
        scoreEl.textContent = score;
        bubble.remove();
      });

      gameArea.appendChild(bubble);

      setTimeout(() => {
        bubble.remove();
      }, 4000);
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      scoreEl.textContent = score;
      timeEl.textContent = timeLeft;
      gameOverEl.style.display = "none";
      gameArea.innerHTML = "";

      startBtn.disabled = true;

      bubbleInterval = setInterval(createBubble, 600);

      gameInterval = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      clearInterval(gameInterval);
      clearInterval(bubbleInterval);
      startBtn.disabled = false;
      gameOverEl.style.display = "block";
      gameOverEl.textContent = `Game Over! Final Score: ${score}`;
    }

    startBtn.addEventListener("click", startGame);
  </script>
</body>
</html>
